<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>每日底線</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e0d4;
    --text-dim: #6b6560;
    --text-mid: #9e9690;
    --morning: #e8c97a;
    --night: #8ab4c9;
    --accent: #c9836a;
    --done: #7ab88a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app { max-width: 480px; margin: 0 auto; padding: 0 20px 100px; }

  /* ── Header ── */
  header {
    padding: 52px 0 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .date-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  h1 {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  h1 span { color: var(--morning); }
  h1.night span { color: var(--night); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin: 28px 0 24px;
    background: var(--surface);
    border-radius: 12px;
    padding: 5px;
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
  }
  .tab.morning.active { color: var(--morning); }
  .tab.night.active { color: var(--night); }

  /* ── Section ── */
  .section { display: none; }
  .section.visible { display: block; animation: fadeUp 0.35s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── Task inputs ── */
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .task-num {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--morning);
    min-width: 18px;
    opacity: 0.7;
  }
  .task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .task-input::placeholder { color: var(--text-dim); font-size: 14px; }
  .task-input:focus { border-color: var(--morning); }

  /* ── Button ── */
  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-morning {
    background: var(--morning);
    color: #1a1500;
  }
  .btn-night {
    background: var(--night);
    color: #091520;
  }
  .btn:active { transform: scale(0.98); opacity: 0.9; }

  /* ── Done count selector ── */
  .done-selector {
    display: flex;
    gap: 10px;
    margin: 6px 0 2px;
  }
  .done-btn {
    flex: 1;
    padding: 14px 6px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-mid);
    font-size: 14px;
    font-family: 'Noto Serif TC', serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .done-btn.selected {
    border-color: var(--night);
    color: var(--night);
    background: rgba(138,180,201,0.08);
  }

  /* ── Textarea ── */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    outline: none;
    resize: none;
    min-height: 90px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  textarea:focus { border-color: var(--night); }
  textarea::placeholder { color: var(--text-dim); font-size: 14px; }

  /* ── Today's morning tasks (shown at night) ── */
  .morning-ref {
    background: rgba(232,201,122,0.04);
    border: 1px solid rgba(232,201,122,0.12);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .morning-ref .ref-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(232,201,122,0.4);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .morning-ref .ref-task {
    font-size: 14px;
    color: rgba(232,201,122,0.75);
    padding: 4px 0;
    display: flex;
    gap: 10px;
  }
  .morning-ref .ref-task span { opacity: 0.5; font-family: 'DM Mono', monospace; font-size: 12px; }

  /* ── Result card ── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    margin-bottom: 14px;
    text-align: center;
  }
  .result-score {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-score.morning { color: var(--morning); }
  .result-score.night { color: var(--night); }
  .result-msg {
    font-size: 15px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .result-note {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 16px;
    line-height: 1.7;
  }

  /* ── Log section ── */
  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .log-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }
  .log-tasks { margin-bottom: 12px; }
  .log-task {
    font-size: 14px;
    color: var(--text-mid);
    padding: 3px 0;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .log-task .n { color: var(--morning); font-family: 'DM Mono', monospace; font-size: 11px; opacity: 0.6; margin-top: 2px; }
  .log-night-row {
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    margin-top: 4px;
  }
  .log-score {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--night);
  }
  .log-review { font-size: 13px; color: var(--text-dim); flex: 1; font-style: italic; }

  .empty-log {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    padding: 48px 0;
    line-height: 1.8;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 50px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Bottom nav ── */
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,13,0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 20px;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    cursor: pointer;
    padding: 6px 0;
    transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 20px; }
  .nav-btn.active { color: var(--text); }
  .nav-btn.morning.active { color: var(--morning); }
  .nav-btn.night.active { color: var(--night); }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .hint {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 10px;
  }
  .hint em { color: var(--morning); font-style: normal; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="date-label" id="dateLabel"></div>
    <h1 id="mainTitle">每日底線 <span id="timeEmoji">🌞</span></h1>
  </header>

  <!-- Tabs (morning/night toggle) -->
  <div class="tabs" id="mainTabs">
    <button class="tab morning active" onclick="switchTab('morning')">🌞 早上設定</button>
    <button class="tab night" onclick="switchTab('night')">🌙 晚上結算</button>
  </div>

  <!-- ══ MORNING SECTION ══ -->
  <div class="section visible" id="morningSection">
    <div id="morningContent"></div>
  </div>

  <!-- ══ NIGHT SECTION ══ -->
  <div class="section" id="nightSection">
    <div id="nightContent"></div>
  </div>

  <!-- ══ LOG SECTION ══ -->
  <div class="section" id="logSection">
    <div id="logContent"></div>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="nav">
  <button class="nav-btn morning active" id="navMorning" onclick="showPage('morning')">
    <span class="icon">🌞</span>早上
  </button>
  <button class="nav-btn night" id="navNight" onclick="showPage('night')">
    <span class="icon">🌙</span>晚上
  </button>
  <button class="nav-btn" id="navLog" onclick="showPage('log')">
    <span class="icon">📖</span>紀錄
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let currentPage = 'morning';
let selectedDone = null;

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getFormattedDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日　週${days[d.getDay()]}`;
}

function loadData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || null; } catch { return null; }
}

function saveData(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

function getAllLogs() {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('day_')) keys.push(k);
  }
  return keys.sort().reverse().map(k => ({ key: k.replace('day_',''), ...loadData(k) }));
}

// ── Init ──
document.getElementById('dateLabel').textContent = getFormattedDate();

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Page routing ──
function showPage(page) {
  currentPage = page;
  ['morning','night','log'].forEach(p => {
    document.getElementById(p+'Section').classList.toggle('visible', p === page);
  });
  document.getElementById('mainTabs').style.display = (page === 'log') ? 'none' : 'flex';

  // nav
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navMap = { morning: 'navMorning', night: 'navNight', log: 'navLog' };
  document.getElementById(navMap[page]).classList.add('active');

  if (page === 'morning') renderMorning();
  if (page === 'night') renderNight();
  if (page === 'log') renderLog();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + tab).classList.add('active');
  showPage(tab);
}

// ── Morning ──
function renderMorning() {
  const today = getTodayKey();
  const existing = loadData('day_' + today);
  const el = document.getElementById('morningContent');

  if (existing && existing.tasks) {
    // Already set today
    el.innerHTML = `
      <div class="result-card">
        <div class="result-score morning">✓</div>
        <div class="result-msg">今天的底線任務已設定好了</div>
        <div class="result-note">
          ${existing.tasks.map((t,i) => `<div style="text-align:left;padding:4px 0;color:var(--text-mid)"><span style="color:var(--morning);font-family:DM Mono,monospace;font-size:12px;margin-right:10px;">${i+1}</span>${t}</div>`).join('')}
        </div>
      </div>
      <div class="hint">想修改任務嗎？點下方「重新設定」清除後重填。</div>
      <button class="btn" style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);" onclick="resetMorning()">重新設定</button>
    `;
  } else {
    el.innerHTML = `
      <div class="hint">設定今天的 <em>三個底線任務</em>，完成就算今天成功。<br>標準放低一點，讓自己有機會打勾。</div>
      <div class="card">
        <div class="card-label">底線任務</div>
        ${[1,2,3].map(i => `
          <div class="task-row">
            <span class="task-num">${i}</span>
            <input class="task-input" id="task${i}" type="text" placeholder="今天一定要完成的事…" maxlength="40">
          </div>
        `).join('')}
      </div>
      <button class="btn btn-morning" onclick="saveMorning()">設定今天的底線 🌞</button>
    `;
  }
}

function saveMorning() {
  const tasks = [1,2,3].map(i => document.getElementById('task'+i).value.trim());
  if (tasks.filter(Boolean).length === 0) { showToast('至少填一個任務吧 🙂'); return; }
  const today = getTodayKey();
  const existing = loadData('day_' + today) || {};
  saveData('day_' + today, { ...existing, tasks, morningTime: new Date().toISOString() });
  showToast('✨ 今天的目標設定完成！');
  renderMorning();
}

function resetMorning() {
  const today = getTodayKey();
  const existing = loadData('day_' + today) || {};
  delete existing.tasks;
  delete existing.morningTime;
  saveData('day_' + today, existing);
  renderMorning();
}

// ── Night ──
function renderNight() {
  const today = getTodayKey();
  const existing = loadData('day_' + today) || {};
  const el = document.getElementById('nightContent');

  if (existing.review) {
    // Already reviewed
    const msgs = ['今天能存在就很好，明天繼續。','完成了一件，這就是進步。','兩件打勾，表現很好！','三件全完成，今天很強。'];
    el.innerHTML = `
      <div class="result-card">
        <div class="result-score night">${existing.done}<span style="font-size:24px;color:var(--text-dim)">/3</span></div>
        <div class="result-msg">${msgs[existing.done] || ''}</div>
        <div class="result-note">「${existing.review}」</div>
      </div>
      <div class="hint">今天已經結算囉。明天繼續加油。</div>
      <button class="btn" style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);" onclick="resetNight()">重新結算</button>
    `;
    return;
  }

  let morningRef = '';
  if (existing.tasks) {
    morningRef = `
      <div class="morning-ref">
        <div class="ref-label">早上設定的底線</div>
        ${existing.tasks.map((t,i) => `<div class="ref-task"><span>${i+1}</span>${t || '（未填）'}</div>`).join('')}
      </div>
    `;
  } else {
    morningRef = `<div class="hint" style="margin-bottom:14px;">今天沒有設定早上任務，但還是可以結算 🙂</div>`;
  }

  el.innerHTML = `
    ${morningRef}
    <div class="card">
      <div class="card-label">完成幾個底線任務？</div>
      <div class="done-selector">
        ${[0,1,2,3].map(n => `<button class="done-btn" id="doneBtn${n}" onclick="selectDone(${n})">${n}<br><span style="font-size:10px;opacity:0.5">${n===3?'全完成':n===0?'0 個':''}</span></button>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-label">今日回顧</div>
      <textarea id="reviewText" placeholder="今天做到了什麼？&#10;不論大小，寫一件就好…" maxlength="200"></textarea>
    </div>
    <button class="btn btn-night" onclick="saveNight()">完成今日結算 🌙</button>
  `;
  selectedDone = null;
}

function selectDone(n) {
  selectedDone = n;
  [0,1,2,3].forEach(i => {
    document.getElementById('doneBtn'+i).classList.toggle('selected', i === n);
  });
}

function saveNight() {
  if (selectedDone === null) { showToast('請選完成幾個任務 🙂'); return; }
  const review = document.getElementById('reviewText').value.trim();
  if (!review) { showToast('寫一句回顧吧，隨便什麼都好'); return; }

  const today = getTodayKey();
  const existing = loadData('day_' + today) || {};
  saveData('day_' + today, { ...existing, done: selectedDone, review, nightTime: new Date().toISOString() });
  showToast('🌙 今日結算完成，好好休息！');
  renderNight();
}

function resetNight() {
  const today = getTodayKey();
  const existing = loadData('day_' + today) || {};
  delete existing.done;
  delete existing.review;
  delete existing.nightTime;
  saveData('day_' + today, existing);
  selectedDone = null;
  renderNight();
}

// ── Log ──
function renderLog() {
  const logs = getAllLogs();
  const el = document.getElementById('logContent');

  if (logs.length === 0) {
    el.innerHTML = `
      <div style="padding-top:20px;">
        <div class="empty-log">還沒有任何紀錄<br><span style="font-size:12px;">從早上設定第一天的目標開始吧</span></div>
      </div>`;
    return;
  }

  const html = logs.map(log => {
    const tasks = log.tasks ? log.tasks.map((t,i) => `
      <div class="log-task"><span class="n">${i+1}</span>${t}</div>
    `).join('') : '<div class="log-task" style="opacity:0.4">未設定早上任務</div>';

    const nightRow = (log.done !== undefined) ? `
      <div class="log-night-row">
        <span class="log-score">${log.done}/3</span>
        <span class="log-review">${log.review || ''}</span>
      </div>` : '';

    return `
      <div class="log-entry">
        <div class="log-date">${log.key}</div>
        <div class="log-tasks">${tasks}</div>
        ${nightRow}
      </div>`;
  }).join('');

  // Stats
  const withNight = logs.filter(l => l.done !== undefined);
  const avgDone = withNight.length ? (withNight.reduce((s,l) => s + l.done, 0) / withNight.length).toFixed(1) : '-';
  const streakDays = logs.length;

  el.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <div class="card" style="flex:1;text-align:center;margin-bottom:0;">
        <div style="font-family:DM Mono,monospace;font-size:28px;color:var(--night);margin-bottom:4px;">${avgDone}</div>
        <div class="card-label" style="margin:0;">平均完成</div>
      </div>
      <div class="card" style="flex:1;text-align:center;margin-bottom:0;">
        <div style="font-family:DM Mono,monospace;font-size:28px;color:var(--morning);margin-bottom:4px;">${streakDays}</div>
        <div class="card-label" style="margin:0;">記錄天數</div>
      </div>
    </div>
    ${html}
  `;
}

// ── Init render ──
renderMorning();
</script>
</body>
</html>
